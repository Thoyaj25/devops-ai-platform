services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketsphere-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://marketsphere:marketsphere@postgres:5432/marketsphere?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DOCKER_IMAGE: ${DOCKER_IMAGE}
      DOCKER_REGISTRY: ${DOCKER_REGISTRY}
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketsphere-worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://marketsphere:marketsphere@postgres:5432/marketsphere?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DOCKER_IMAGE: ${DOCKER_IMAGE}
      DOCKER_REGISTRY: ${DOCKER_REGISTRY}
      # Step 1 — Pass credentials into the worker
      DOCKER_USER: ${DOCKER_USER}
      DOCKER_PASSWORD: ${DOCKER_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16-alpine
    container_name: marketsphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketsphere
      POSTGRES_PASSWORD: marketsphere
      POSTGRES_DB: marketsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketsphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: marketsphere-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: